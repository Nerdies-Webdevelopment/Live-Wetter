name: GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Rust installieren
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Dioxus CLI installieren
        run: cargo install dioxus-cli --version 0.7.3 --locked

      - name: Web-App bauen
        run: dx build --web --release --base-path "/${{ github.event.repository.name }}/"

      - name: PWA-Dateien in den Build kopieren
        shell: pwsh
        run: ./sync-pwa-assets.ps1 -Release

      - name: Pages konfigurieren
        uses: actions/configure-pages@v5

      - name: Pages-Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/dx/nerdies_weather/release/web/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Auf GitHub Pages veroeffentlichen
        id: deployment
        uses: actions/deploy-pages@v4
